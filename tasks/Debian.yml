- name: Install Neovim build prerequisites via APT
  ansible.builtin.apt:
    name:
      - ninja-build
      - gettext
      - cmake
      - unzip
      - curl
      - build-essential
    state: present
    update_cache: true

- name: Add Fastfetch PPA repository
  ansible.builtin.apt_repository:
    repo: ppa:zhangsongcui3371/fastfetch
    codename: noble #Foves mint to look at Unbuntu 24.04
    state: present
    update_cache: true

- name: Install Fastfetch package
  ansible.builtin.apt:
    name: fastfetch
    state: present
